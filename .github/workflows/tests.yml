name: Tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: restos_test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: restos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U restos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      SECRET_KEY: ci-secret-key
      DATABASE_URL: postgresql+asyncpg://restos_test:test@localhost:5432/restos_test
      BOT_API_SECRET: ci-bot-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run backend tests
        run: python -m pytest tests/ -v --ignore=tests/e2e

  e2e:
    runs-on: ubuntu-latest
    needs: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: restos_test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: restos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U restos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      SECRET_KEY: ci-secret-key
      DATABASE_URL: postgresql+asyncpg://restos_test:test@localhost:5432/restos_test
      TEST_DATABASE_URL: postgresql+asyncpg://restos_test:test@localhost:5432/restos_test
      BOT_API_SECRET: ci-bot-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Install Chromium for Playwright
        run: playwright install --with-deps chromium

      - name: Run migrations
        run: alembic upgrade head

      - name: Run E2E tests
        run: python -m pytest tests/e2e/ -v
