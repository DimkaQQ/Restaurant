{% extends "base.html" %}
{% block title %}Заказы — RestOS{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Заказы</h1>
  <span class="live-badge">● LIVE</span>
</div>

<div class="filters">
  <select id="venue-filter" onchange="reloadOrders()" class="select-input">
    <option value="">Все заведения</option>
    {% for v in venues %}
    <option value="{{ v.id }}">{{ v.name }}</option>
    {% endfor %}
  </select>
</div>

<div
  id="orders-board"
  class="orders-board"
  hx-get="/partials/orders"
  hx-trigger="load, every 8s"
  hx-swap="innerHTML"
>
  <div class="loading">Загрузка заказов...</div>
</div>

<script>
  function reloadOrders() {
    const venueId = document.getElementById('venue-filter').value;
    const url = '/partials/orders' + (venueId ? '?venue_id=' + venueId : '');
    htmx.ajax('GET', url, {target: '#orders-board', swap: 'innerHTML'});
  }
</script>
{% endblock %}
