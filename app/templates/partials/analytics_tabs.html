<style>
.analytics-tabs { display: flex; gap: .25rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.analytics-tab {
  padding: .65rem 1rem; font-size: .85rem; color: var(--muted); text-decoration: none;
  border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s;
  min-height: 36px; display: flex; align-items: center;
}
.analytics-tab:hover { color: var(--white); }
.analytics-tab.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 600; }
</style>
<div class="analytics-tabs">
  <a href="/analytics/" class="analytics-tab {% if request.url.path == '/analytics/' %}active{% endif %}">Обзор</a>
  <a href="/analytics/nps" class="analytics-tab {% if request.url.path == '/analytics/nps' %}active{% endif %}">NPS</a>
  <a href="/finance" class="analytics-tab {% if request.url.path == '/finance' %}active{% endif %}">Финансы</a>
</div>
