<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}RestOS{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  {% block head %}{% endblock %}
</head>
<body>
  {% if user is defined and user %}
  <nav class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-serif">Rest</span><span class="logo-mono">OS</span>
    </div>
    <ul class="nav-links">
      <li><a href="/dashboard" class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Дашборд
      </a></li>
      <li><a href="/orders" class="nav-link {% if request.url.path == '/orders' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Заказы
      </a></li>
      <li><a href="/menu" class="nav-link {% if request.url.path == '/menu' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/></svg>
        Меню
      </a></li>
      <li><a href="/guests" class="nav-link {% if request.url.path == '/guests' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
        Гости
      </a></li>
      <li><a href="/analytics" class="nav-link {% if request.url.path == '/analytics' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>
        Аналитика
      </a></li>
    </ul>
    <div class="sidebar-footer">
      <span class="user-email">{{ user.email }}</span>
      <button onclick="logout()" class="btn-logout">Выйти</button>
    </div>
  </nav>
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
  {% else %}
    {% block full_content %}{% endblock %}
  {% endif %}

  <script>
    async function logout() {
      await fetch('/auth/logout', { method: 'POST' });
      localStorage.removeItem('access_token');
      document.cookie = 'access_token=; Max-Age=0; path=/';
      location.href = '/auth/login';
    }

    // При 401 от htmx — редиректим на логин
    document.addEventListener('htmx:responseError', (e) => {
      if (e.detail.xhr.status === 401 || e.detail.xhr.status === 307) {
        location.href = '/auth/login';
      }
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
