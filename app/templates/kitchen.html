<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кухня — {{ current_venue.name if current_venue else 'Все заведения' }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { background: #0A0A0A; display: block; }
    .kds-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.875rem 1.5rem;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .kds-brand { font-size: 1rem; font-weight: 700; color: var(--gold); letter-spacing: 0.04em; }
    .kds-venue-name { font-size: 0.9rem; color: var(--muted); }
    .kds-clock { font-size: 1.5rem; font-weight: 600; color: var(--white); font-variant-numeric: tabular-nums; }
    .kds-filter {
      display: flex; gap: 1rem; padding: 0.75rem 1.5rem;
      background: var(--card); border-bottom: 1px solid var(--border);
    }
    .kds-filter select { max-width: 280px; }
    .kds-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      height: calc(100vh - 110px);
      overflow: hidden;
    }
    .kds-col {
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .kds-col:last-child { border-right: none; }
    .kds-col-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .kds-col-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
    .kds-col-title.new      { color: var(--gold); }
    .kds-col-title.preparing { color: #F97316; }
    .kds-col-title.ready    { color: var(--success); }
    .kds-col-count { font-size: 0.75rem; color: var(--muted); }
    .kds-cards {
      flex: 1; overflow-y: auto; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.6rem;
    }
    .kds-card {
      background: #1C1A17;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.875rem;
    }
    .kds-card.status-new      { border-left: 3px solid var(--gold); }
    .kds-card.status-confirmed { border-left: 3px solid #38BDF8; }
    .kds-card.status-preparing { border-left: 3px solid #F97316; }
    .kds-card.status-ready    { border-left: 3px solid var(--success); }
    .kds-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .kds-order-id { font-family: monospace; font-size: 0.85rem; color: var(--muted); }
    .kds-venue-tag { font-size: 0.7rem; color: var(--muted); background: rgba(255,255,255,0.05); padding: 0.15rem 0.4rem; border-radius: 4px; }
    .kds-elapsed { font-size: 0.8rem; font-weight: 600; }
    .kds-elapsed.fast { color: var(--success); }
    .kds-elapsed.medium { color: var(--gold); }
    .kds-elapsed.slow { color: var(--danger); }
    .kds-items { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.6rem; }
    .kds-item { font-size: 0.9rem; font-weight: 500; display: flex; justify-content: space-between; }
    .kds-item-qty { color: var(--gold); font-weight: 700; }
    .kds-action {
      display: flex; gap: 0.5rem; margin-top: 0.5rem;
    }
    .kds-btn {
      flex: 1; padding: 0.5rem; border: none; border-radius: 6px;
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
    }
    .kds-btn-advance { background: var(--gold); color: #0D0D0D; }
    .kds-btn-advance:hover { opacity: 0.85; }
    .kds-empty { color: var(--muted); text-align: center; padding: 3rem 1rem; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="kds-header">
    <div>
      <div class="kds-brand">RestOS · Кухня</div>
      <div class="kds-venue-name">{{ current_venue.name if current_venue else 'Все заведения' }}</div>
    </div>
    <div class="kds-clock" id="clock">--:--</div>
  </div>

  <div class="kds-filter">
    <select onchange="changeVenue(this.value)" style="background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--white);padding:0.5rem 0.75rem;border-radius:8px;font-size:0.875rem;">
      <option value="">Все заведения</option>
      {% for v in venues %}
      <option value="{{ v.id }}" {% if current_venue and v.id == current_venue.id %}selected{% endif %}>{{ v.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div
    id="kds-board"
    class="kds-board"
    hx-get="/partials/kitchen{% if current_venue %}?venue_id={{ current_venue.id }}{% endif %}"
    hx-trigger="load, every 10s"
    hx-swap="innerHTML"
  ></div>

  <script>
    function tick() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }
    tick();
    setInterval(tick, 1000);

    function changeVenue(vid) {
      location.href = '/kitchen' + (vid ? '?venue_id=' + vid : '');
    }

    document.addEventListener('htmx:responseError', (e) => {
      if (e.detail.xhr.status === 401 || e.detail.xhr.status === 307) {
        location.href = '/auth/login';
      }
    });
  </script>
</body>
</html>
