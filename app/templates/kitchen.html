<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кухня — {{ current_venue.name if current_venue else 'Все заведения' }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/main.css?v=7">
  <script src="/static/vendor/htmx-1.9.12.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #0A0A0A; display: block; font-family: 'Inter', sans-serif; }
    .kds-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: #111;
      border-bottom: 2px solid #222;
    }
    .kds-brand { font-size: 1.1rem; font-weight: 700; color: var(--gold); }
    .kds-venue-name { font-size: 0.85rem; color: var(--muted); margin-top: 0.1rem; }
    .kds-clock { font-size: 2rem; font-weight: 700; color: var(--white); font-variant-numeric: tabular-nums; letter-spacing: 0.05em; }
    .kds-filter {
      display: flex; gap: 1rem; padding: 0.6rem 1.25rem;
      background: #0f0f0f; border-bottom: 1px solid #222;
    }
    .kds-filter select { max-width: 300px; font-size: 0.95rem; }
    .kds-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      height: calc(100vh - 130px);
      overflow: hidden;
    }
    .kds-col {
      border-right: 2px solid #1a1a1a;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .kds-col:last-child { border-right: none; }
    .kds-col-header {
      padding: 0.875rem 1rem;
      border-bottom: 2px solid #1a1a1a;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
      background: #111;
    }
    .kds-col-title { font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
    .kds-col-title.new       { color: var(--gold); }
    .kds-col-title.preparing { color: #F97316; }
    .kds-col-title.ready     { color: var(--success); }
    .kds-col-count {
      font-size: 1.1rem; font-weight: 700; color: var(--white);
      background: rgba(255,255,255,0.08); padding: 0.2rem 0.6rem; border-radius: 20px;
    }
    .kds-cards {
      flex: 1; overflow-y: auto; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.75rem;
    }
    .kds-card {
      background: #171512;
      border: 2px solid #2a2520;
      border-radius: 12px;
      padding: 1rem;
    }
    .kds-card.status-new       { border-left: 5px solid var(--gold); }
    .kds-card.status-confirmed { border-left: 5px solid #38BDF8; }
    .kds-card.status-preparing { border-left: 5px solid #F97316; }
    .kds-card.status-ready     { border-left: 5px solid var(--success); }
    .kds-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; gap: 0.5rem; }
    .kds-order-id { font-family: monospace; font-size: 1rem; color: rgba(255,255,255,0.5); font-weight: 600; }
    .kds-venue-tag { font-size: 0.78rem; color: var(--muted); background: rgba(255,255,255,0.06); padding: 0.25rem 0.5rem; border-radius: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
    .kds-elapsed { font-size: 1.1rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 6px; }
    .kds-elapsed.fast   { color: var(--success); background: rgba(75,200,122,0.1); }
    .kds-elapsed.medium { color: var(--gold);    background: rgba(200,168,75,0.1); }
    .kds-elapsed.slow   { color: var(--danger);  background: rgba(220,80,80,0.12); }
    .kds-items { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .kds-item { font-size: 1.05rem; font-weight: 500; display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; }
    .kds-item-name { color: var(--white); }
    .kds-item-qty { color: var(--gold); font-weight: 800; font-size: 1.15rem; white-space: nowrap; }
    .kds-action { display: flex; gap: 0.5rem; margin-top: 0.25rem; }
    .kds-btn {
      flex: 1; padding: 0.875rem 0.5rem; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; cursor: pointer; touch-action: manipulation;
      transition: opacity 0.15s, transform 0.1s;
    }
    .kds-btn:active { transform: scale(0.97); opacity: 0.8; }
    .kds-btn-advance { background: var(--gold); color: #0D0D0D; flex: 1; }
    .kds-btn-cancel { background: rgba(200,75,75,0.15); color: var(--danger); border: 1px solid rgba(200,75,75,0.3); flex: 0; min-width: 48px; }
    .kds-empty { color: var(--muted); text-align: center; padding: 3rem 1rem; font-size: 1rem; }
    .kds-tabs { display:flex; gap:0; border-bottom:2px solid #222; background:#0f0f0f; }
    .kds-tab { padding:.7rem 1.5rem; background:none; border:none; color:var(--muted); font-size:.9rem; font-weight:600; cursor:pointer; letter-spacing:.04em; text-transform:uppercase; border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .15s; }
    .kds-tab.active { color:var(--gold); border-bottom-color:var(--gold); }
    .kds-tab-count { display:inline-block; background:rgba(200,168,75,.2); color:var(--gold); border-radius:10px; padding:.05rem .45rem; font-size:.78rem; margin-left:.4rem; }
    #tab-history-panel { height:calc(100vh - 162px); overflow-y:auto; }

    @media (max-width: 768px) {
      .kds-header { padding: 0.5rem 0.75rem; }
      .kds-clock { font-size: 1.4rem; }
      .kds-filter { flex-wrap: wrap; gap: 0.5rem; padding: 0.4rem 0.75rem; }
      .kds-filter select { max-width: 100%; width: 100%; }
      .kds-tabs .kds-tab { padding: 0.6rem 0.75rem; font-size: 0.78rem; }
      .kds-board {
        grid-template-columns: 1fr;
        height: auto;
        overflow: visible;
      }
      .kds-col {
        border-right: none;
        border-bottom: 2px solid #1a1a1a;
        max-height: 60vh;
      }
      .kds-col:last-child { border-bottom: none; }
      #tab-history-panel { height: auto; max-height: 80vh; }
    }
  </style>
</head>
<body>
  <div class="kds-header">
    <div>
      <div class="kds-brand">RestOS · Кухня</div>
      <div class="kds-venue-name">{{ current_venue.name if current_venue else 'Все заведения' }}</div>
    </div>
    <div class="kds-clock" id="clock">--:--</div>
  </div>

  <div class="kds-filter">
    <select onchange="changeVenue(this.value)" style="background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--white);padding:0.5rem 0.75rem;border-radius:8px;font-size:0.875rem;">
      <option value="">Все заведения</option>
      {% for v in venues %}
      <option value="{{ v.id }}" {% if current_venue and v.id == current_venue.id %}selected{% endif %}>{{ v.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="kds-tabs">
    <button class="kds-tab active" id="tab-btn-active" onclick="switchTab('active')">
      Активные <span class="kds-tab-count" id="active-count">—</span>
    </button>
    <button class="kds-tab" id="tab-btn-history" onclick="switchTab('history')">
      История сегодня
    </button>
  </div>

  <div
    id="tab-active-panel"
    class="kds-board"
    hx-get="/partials/kitchen{% if current_venue %}?venue_id={{ current_venue.id }}{% endif %}"
    hx-trigger="load, every 5s, refresh"
    hx-swap="innerHTML"
  ></div>

  <div
    id="tab-history-panel"
    style="display:none"
    hx-get="/partials/kitchen/history{% if current_venue %}?venue_id={{ current_venue.id }}{% endif %}"
    hx-trigger="revealed, every 30s"
    hx-swap="innerHTML"
  ></div>

  <script>
    function switchTab(tab) {
      const isActive = tab === 'active';
      document.getElementById('tab-active-panel').style.display = isActive ? 'grid' : 'none';
      document.getElementById('tab-history-panel').style.display = isActive ? 'none' : 'block';
      document.getElementById('tab-btn-active').classList.toggle('active', isActive);
      document.getElementById('tab-btn-history').classList.toggle('active', !isActive);
      if (!isActive) htmx.trigger(document.getElementById('tab-history-panel'), 'revealed');
    }

    // Update active order count badge
    document.addEventListener('htmx:afterSettle', () => {
      const cards = document.querySelectorAll('#tab-active-panel .kds-card');
      document.getElementById('active-count').textContent = cards.length || '0';
    });

    function tick() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    }
    tick();
    setInterval(tick, 1000);

    function changeVenue(vid) {
      location.href = '/kitchen' + (vid ? '?venue_id=' + vid : '');
    }

    async function advanceOrder(orderId, newStatus) {
      try {
        const res = await fetch('/api/orders/' + orderId + '/status', {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          credentials: 'include',
          body: JSON.stringify({status: newStatus}),
        });
        if (res.status === 401 || res.status === 307) { location.href = '/auth/login'; return; }
        if (!res.ok) {
          const d = await res.json().catch(() => ({}));
          alert(d.detail || 'Ошибка обновления статуса');
          return;
        }
        htmx.trigger(document.getElementById('tab-active-panel'), 'refresh');
      } catch(e) { console.error('advanceOrder error', e); }
    }

    async function cancelOrder(orderId) {
      if (!confirm('Отменить заказ?')) return;
      try {
        const res = await fetch('/api/orders/' + orderId + '/cancel', {
          method: 'POST',
          credentials: 'include',
        });
        if (res.status === 401 || res.status === 307) { location.href = '/auth/login'; return; }
        if (!res.ok) {
          const d = await res.json().catch(() => ({}));
          alert(d.detail || 'Ошибка отмены');
          return;
        }
        htmx.trigger(document.getElementById('tab-active-panel'), 'refresh');
      } catch(e) { console.error('cancelOrder error', e); }
    }

    document.addEventListener('htmx:responseError', (e) => {
      if (e.detail.xhr.status === 401 || e.detail.xhr.status === 307) {
        location.href = '/auth/login';
      }
    });
    document.addEventListener('htmx:afterRequest', (e) => {
      if (e.detail.xhr && e.detail.xhr.responseURL && e.detail.xhr.responseURL.includes('/auth/login')) {
        location.href = '/auth/login';
      }
    });
  </script>
</body>
</html>
