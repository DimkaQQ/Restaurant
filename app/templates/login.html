<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestOS — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css?v=7">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-serif">Rest</span><span class="logo-mono">OS</span>
      </div>
      <p class="auth-subtitle">Панель управления сетью ресторанов</p>

      <div id="error-msg" class="error-banner" style="display:none"></div>

      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" name="email" placeholder="owner@restaurant.kz" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary btn-full">Войти</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('error-msg');
      err.style.display = 'none';
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
        credentials: 'include',
      });
      if (res.ok) {
        const data = await res.json();
        localStorage.setItem('access_token', data.access_token);
        location.href = '/dashboard';
      } else {
        let msg = 'Ошибка входа';
        try {
          const data = await res.json();
          msg = data.detail || msg;
        } catch {}
        err.textContent = msg;
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
