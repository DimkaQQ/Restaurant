[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
# Backend (async/DB) and e2e (sync/browser) suites use incompatible event-loop
# models and must run as separate pytest processes — see tests/README.md.
# Default collection covers backend only; `make test-e2e` targets tests/e2e.
norecursedirs = e2e
