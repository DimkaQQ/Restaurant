services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: restos
      POSTGRES_PASSWORD: restos_secret
      POSTGRES_DB: restos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restos"]
      interval: 3s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://restos:restos_secret@db/restos
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 2
    environment:
      DATABASE_URL: postgresql+asyncpg://restos:restos_secret@db/restos
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      BOT_TOKEN_VENUE_1: ${BOT_TOKEN_VENUE_1:-}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8001}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - .:/app
    working_dir: /app
    restart: unless-stopped

  backup:
    image: postgres:15-alpine
    environment:
      PGHOST: db
      PGUSER: restos
      PGPASSWORD: restos_secret
      PGDATABASE: restos
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: >
      sh -c "
      while true; do
        FILE=/backups/restos_$$(date +%Y%m%d_%H%M%S).sql.gz;
        pg_dump | gzip > $$FILE && echo \"Backed up to $$FILE\";
        find /backups -name 'restos_*.sql.gz' -mtime +14 -delete;
        sleep 21600;
      done
      "

  bot:
    build: .
    command: python -m bot.main
    environment:
      DATABASE_URL: postgresql+asyncpg://restos:restos_secret@db/restos
      API_URL: http://api:8001
      BOT_TOKEN_VENUE_1: ${BOT_TOKEN_VENUE_1:-}
      NETWORK_ID: ${NETWORK_ID:-}
      VENUE_ID_1: ${VENUE_ID_1:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      TELEGRAM_API_SERVER: ${TELEGRAM_API_SERVER:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
