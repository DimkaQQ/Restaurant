version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: restos
      POSTGRES_PASSWORD: restos_secret
      POSTGRES_DB: restos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restos"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://restos:restos_secret@db/restos
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      BOT_TOKEN_VENUE_1: ${BOT_TOKEN_VENUE_1:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app

  bot:
    build: .
    command: python -m bot.main
    environment:
      DATABASE_URL: postgresql+asyncpg://restos:restos_secret@db/restos
      API_URL: http://api:8000
      BOT_TOKEN_VENUE_1: ${BOT_TOKEN_VENUE_1:-}
      NETWORK_ID: ${NETWORK_ID:-}
      VENUE_ID_1: ${VENUE_ID_1:-}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
